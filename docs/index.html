<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>offici5l</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="page">
  <div class="profile">
    <img id="ava" class="ava">
    <h1 id="username"></h1>
  </div>
  <div class="sep"></div>
  <div class="proj">
    <div class="proj-header">
      <span class="sec-lbl">Public Projects</span>
      <div class="nav">
        <button class="nbtn" id="prev" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="nav-count" id="counter">—</span>
        <button class="nbtn" id="next" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>
    <div class="cmask" id="mask">
      <div class="ctrack" id="track"><div class="pskel"></div></div>
    </div>
    <div class="dots" id="dots"></div>
    <a id="repos-btn" target="_blank" class="repos-btn">
      View all public repositories
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
    </a>
  </div>
  <div class="sep"></div>
  <div class="crypto">
    <span class="sec-lbl">If you like my work</span>
    <div class="clist" id="clist"></div>
  </div>
  <div class="sep"></div>
  <div class="slist" id="slist"></div>
</div>
<div class="toast" id="toast">✓ Copied</div>
<script src="info.js"></script>
<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="">
    <meta name="author" content="">
    
    <!-- Open Graph -->
    <meta property="og:title" content="">
    <meta property="og:description" content="">
    <meta property="og:url" content="http://localhost:4001/projects.html">
    <meta property="og:type" content="website">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="/assets/css/main.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
</head>
<body>
    <div class="site-wrapper">
        <main class="projects-page">
    <div class="container">
        <!-- Back Navigation -->
        <div class="page-header">
            <a href="/" class="back-link">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
                Back to Home
            </a>
        </div>
        
        <!-- Projects Grid -->
        <div class="projects-grid">
            <div id="projects-container">
                <!-- Projects will be loaded here by JavaScript -->
                <p>Loading projects...</p>
            </div>

            <script>
                document.addEventListener('DOMContentLoaded', function() {
                    const projectsContainer = document.getElementById('projects-container');
                    const username = 'offici5l'; // Your GitHub username
                    const githubApiUrl = `https://api.github.com/users/${username}/repos`;
                    const homepagePrefix = `https://${username}.github.io`;

                    fetch(githubApiUrl)
                        .then(response => {
                            if (!response.ok) {
                                throw new Error(`HTTP error! status: ${response.status}`);
                            }
                            return response.json();
                        })
                        .then(repos => {
                            projectsContainer.innerHTML = ''; // Clear loading message
                            const filteredProjects = repos.filter(repo => 
                                repo.homepage && repo.homepage.startsWith(homepagePrefix)
                            );

                            if (filteredProjects.length === 0) {
                                projectsContainer.innerHTML = '<p>No projects found with the specified homepage prefix.</p>';
                                return;
                            }

                            filteredProjects.forEach(project => {
                                const projectCard = document.createElement('article');
                                projectCard.className = 'project-card';
                                projectCard.innerHTML = `
                                    <div class="card-content">
                                        <h2 class="project-title">${project.name}</h2>
                                        <p class="project-description">${project.description || 'No description available.'}</p>
                                        <div class="project-meta">
                                            ${project.language ? `<span class="project-category">${project.language}</span>` : ''}
                                        </div>
                                    </div>
                                    <div class="card-footer">
                                        <a href="${project.html_url}" class="view-project-btn" target="_blank" rel="noopener noreferrer">
                                            <span>View on GitHub</span>
                                            <svg viewBox="0 0 24 24" fill="currentColor">
                                                <path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/>
                                            </svg>
                                        </a>
                                    </div>
                                `;
                                projectsContainer.appendChild(projectCard);
                            });
                        })
                        .catch(error => {
                            console.error('Error fetching projects:', error);
                            projectsContainer.innerHTML = `<p>Failed to load projects. Error: ${error.message}</p>`;
                        });
                });
            </script>
            <div class="view-all-projects">
                <a href="https://github.com/offici5l?tab=repositories" target="_blank" rel="noopener noreferrer" class="btn btn-primary">
                    View all projects on GitHub
                </a>
            </div>
        </div>
    </div>
</main>

    </div>
    
    <!-- Scripts -->
    <script src="/assets/js/main.js"></script>
</body>
</html>

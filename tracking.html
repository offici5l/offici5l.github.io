<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Count</title>
</head>
<body>
    <h1>Download Count: <span id="downloadCount">Loading...</span></h1>

    <script>
        fetch('https://api.github.com/repos/offici5l/MiUnlockTool/releases/assets/196944664')
            .then(response => response.json())
            .then(data => {
                const downloadCount = data.download_count; document.getElementById('downloadCount').textContent = downloadCount;
            })
            .catch(error => {
                console.error('Error fetching download count:', error);
                document.getElementById('downloadCount').textContent = "Error";
            });
    </script>
</body>
</html>

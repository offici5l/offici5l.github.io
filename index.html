<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Explore My Tech Odyssey</title>
  <style>
    :root {
      --color-background: rgb(255, 255, 255);
      --color-surface: rgb(239, 243, 244);
      --color-text-primary: rgb(15, 20, 25);
      --color-text-secondary: rgb(83, 100, 113);
      --color-text-tertiary: rgb(130, 154, 171);
      --color-brand-primary: rgb(29, 155, 240);
      --color-border: rgb(239, 243, 244);
      --color-hover: rgba(29, 155, 240, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: ui-sans-serif, system-ui, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
      min-height: 100vh;
      background: var(--color-background);
      color: var(--color-text-primary);
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      width: 100%;
      text-align: center;
      padding: 40px 20px;
    }

    .logo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--color-border);
      margin: 0 auto 40px;
      display: block;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .logo:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 25px rgba(29, 155, 240, 0.15);
    }

    .title {
      font-size: 2rem;
      font-weight: 700;
      color: var(--color-text-primary);
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 1.1rem;
      color: var(--color-text-secondary);
      margin-bottom: 40px;
      font-weight: 400;
    }

    .button-container {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 50px;
    }

    .button {
      background: var(--color-brand-primary);
      border: none;
      color: white;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 9999px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 120px;
      font-family: inherit;
    }

    .button:hover {
      background: rgb(26, 140, 216);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(29, 155, 240, 0.3);
    }

    .button:active {
      transform: translateY(0);
    }

    .button.secondary {
      background: transparent;
      color: var(--color-text-primary);
      border: 1px solid var(--color-border);
    }

    .button.secondary:hover {
      background: var(--color-hover);
      border-color: var(--color-brand-primary);
      color: var(--color-brand-primary);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(29, 155, 240, 0.15);
    }

    .social-section {
      margin-bottom: 40px;
    }

    .social-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--color-text-primary);
      margin-bottom: 20px;
    }

    .social-icons {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 30px;
    }

    .social-icons a {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-surface);
      border-radius: 50%;
      transition: all 0.2s ease;
      text-decoration: none;
    }

    .social-icons a:hover {
      background: var(--color-hover);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(29, 155, 240, 0.15);
    }

    .social-icons svg {
      width: 20px;
      height: 20px;
      fill: var(--color-text-secondary);
      transition: fill 0.2s ease;
    }

    .social-icons a:hover svg {
      fill: var(--color-brand-primary);
    }

    .contact-section {
      background: var(--color-surface);
      padding: 24px;
      border-radius: 16px;
      border: 1px solid var(--color-border);
    }

    .contact-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--color-text-primary);
      margin-bottom: 12px;
    }

    .email-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--color-background);
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid var(--color-border);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .email-container:hover {
      border-color: var(--color-brand-primary);
      background: var(--color-hover);
    }

    .email-container span {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--color-text-primary);
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Consolas, "Liberation Mono", Menlo, monospace;
    }

    .copy-icon {
      width: 18px;
      height: 18px;
      fill: var(--color-text-secondary);
      transition: fill 0.2s ease;
    }

    .email-container:hover .copy-icon {
      fill: var(--color-brand-primary);
    }

    .copy-feedback {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--color-brand-primary);
      color: white;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      opacity: 0;
      transform: translateY(-10px);
      transition: all 0.3s ease;
      z-index: 1000;
    }

    .copy-feedback.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 768px) {
      .container {
        padding: 30px 15px;
      }

      .logo {
        width: 100px;
        height: 100px;
      }

      .title {
        font-size: 1.75rem;
      }

      .subtitle {
        font-size: 1rem;
      }

      .button {
        padding: 10px 20px;
        font-size: 0.95rem;
        min-width: 100px;
      }

      .social-icons {
        gap: 12px;
      }

      .social-icons a {
        width: 40px;
        height: 40px;
      }

      .social-icons svg {
        width: 18px;
        height: 18px;
      }

      .contact-section {
        padding: 20px;
      }

      .email-container span {
        font-size: 0.85rem;
      }
    }

    @media (max-width: 480px) {
      .button-container {
        flex-direction: column;
        align-items: center;
      }

      .button {
        width: 100%;
        max-width: 200px;
      }

      .social-icons {
        gap: 10px;
      }

      .social-icons a {
        width: 36px;
        height: 36px;
      }

      .social-icons svg {
        width: 16px;
        height: 16px;
      }
    }

    /* Smooth animations */
    .container > * {
      animation: fadeInUp 0.6s ease-out;
      animation-fill-mode: both;
    }

    .logo { animation-delay: 0.1s; }
    .title { animation-delay: 0.2s; }
    .subtitle { animation-delay: 0.3s; }
    .button-container { animation-delay: 0.4s; }
    .social-section { animation-delay: 0.5s; }
    .contact-section { animation-delay: 0.6s; }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Focus styles for accessibility */
    .button:focus,
    .social-icons a:focus,
    .email-container:focus {
      outline: 2px solid var(--color-brand-primary);
      outline-offset: 2px;
    }
  </style>
</head>
<body>

  <div class="copy-feedback" id="copyFeedback">Email copied to clipboard!</div>

  <script>
    const emailContainer = document.querySelector('.email-container');
    const copyFeedback = document.getElementById('copyFeedback');
    const email = 'offici5lcontact@proton.me';

    function showCopyFeedback() {
      copyFeedback.classList.add('show');
      setTimeout(() => {
        copyFeedback.classList.remove('show');
      }, 2000);
    }

    function copyEmail() {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(email).then(() => {
          showCopyFeedback();
        }).catch(() => {
          // Fallback for older browsers
          const textArea = document.createElement('textarea');
          textArea.value = email;
          document.body.appendChild(textArea);
          textArea.focus();
          textArea.select();
          try {
            document.execCommand('copy');
            showCopyFeedback();
          } catch (err) {
            console.error('Failed to copy email');
          }
          document.body.removeChild(textArea);
        });
      } else {
        // Fallback for browsers without clipboard API
        const textArea = document.createElement('textarea');
        textArea.value = email;
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
          document.execCommand('copy');
          showCopyFeedback();
        } catch (err) {
          console.error('Failed to copy email');
        }
        document.body.removeChild(textArea);
      }
    }

    emailContainer.addEventListener('click', copyEmail);
    emailContainer.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        copyEmail();
      }
    });
  </script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Official Blog</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@500&display=swap" rel="stylesheet">
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 0;
    background-color: #f0f0f0;
  }

  .logo {
    width: 200px;
    height: 200px;
    margin-top: 20px;
  }

  .welcome-text {
    font-size: 24px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    margin: 20px 0;
  }

  .description {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 30px;
  }

  .button-container {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 20px;
  }

  .button {
    background: rgba(255, 255, 255, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: black;
    padding: 15px 20px;
    text-align: center;
    text-decoration: none;
    display: inline-block;
    font-size: 16px;
    margin: 10px;
    cursor: pointer;
    border-radius: 10px;
    transition: background 0.3s, transform 0.3s, box-shadow 0.3s;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    font-family: 'Roboto', sans-serif;
    font-weight: 500;
  }

  .button:hover {
    background: rgba(255, 255, 255, 0.3);
    transform: translateY(-3px);
    box-shadow: 0 8px 12px rgba(0, 0, 0, 0.2);
  }

  .button:active {
    background: rgba(255, 255, 255, 0.4);
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    transform: translateY(0);
  }
</style>
</head>
<body>
  <div>
    <img src="./logo.png" alt="logo" class="logo">
  </div>

  <div>
    <p class="welcome-text"><strong>Welcome to Offici5l Blog</strong></p>
    <p class="description"><strong>Here, I share my experiences, projects, and topics related to technology and creativity💡</strong></p>
  </div>

  <div class="button-container">
    <button class="button" onclick="window.location.href='./Projects';">Projects</button>
    <button class="button" onclick="window.location.href='./Articles';">Articles</button>
    <button class="button" onclick="window.location.href='./Contact';">Contact</button>
  </div>
</body>
</html>

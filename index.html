<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Explore My Tech Odyssey</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #065f46, #0284c7);
      color: #fff;
      overflow-x: hidden;
    }

    .container {
      max-width: 900px;
      text-align: center;
      padding: 30px;
    }

    .logo {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid #ffffff33;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
      margin-bottom: 40px;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .logo:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.4);
    }

    .button-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 50px;
    }

    .button {
      background: linear-gradient(45deg, #f59e0b, #f97316);
      border: none;
      color: #fff;
      padding: 15px 35px;
      font-size: 1.1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.5s ease;
    }

    .button:hover::before {
      left: 100%;
    }

    .button:hover {
      background: linear-gradient(45deg, #d97706, #ea580c);
      transform: translateY(-4px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
    }

    .button:active {
      transform: translateY(0);
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
    }

    .social-icons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
      animation: fadeIn 1.2s ease-out;
    }

    .social-icons a {
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .social-icons a:hover {
      transform: scale(1.15);
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
    }

    .social-icons svg {
      width: 28px;
      height: 28px;
      fill: #f1c40f;
    }

    .email-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.1);
      padding: 12px 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      animation: fadeIn 1.4s ease-out;
      max-width: 400px;
      margin: 0 auto;
    }

    .email-container span {
      font-size: 1.1rem;
      font-weight: 400;
      color: #ffffff;
    }

    .email-container .copy-icon {
      width: 24px;
      height: 24px;
      fill: #f1c40f;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .email-container .copy-icon:hover {
      transform: scale(1.2);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    html {
      scroll-behavior: smooth;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    @media (max-width: 768px) {
      .logo {
        width: 120px;
        height: 120px;
      }

      .button {
        padding: 12px 30px;
        font-size: 1rem;
      }

      .social-icons a {
        width: 45px;
        height: 45px;
      }

      .social-icons svg {
        width: 24px;
        height: 24px;
      }

      .email-container span {
        font-size: 1rem;
      }

      .email-container .copy-icon {
        width: 22px;
        height: 22px;
      }
    }

    @media (max-width: 480px) {
      .button-container {
        flex-direction: column;
        gap: 15px;
      }

      .button {
        padding: 10px 25px;
        font-size: 0.9rem;
      }

      .social-icons {
        gap: 15px;
      }

      .social-icons a {
        width: 40px;
        height: 40px;
      }

      .social-icons svg {
        width: 20px;
        height: 20px;
      }

      .email-container {
        padding: 10px 15px;
      }

      .email-container span {
        font-size: 0.9rem;
      }

      .email-container .copy-icon {
        width: 20px;
        height: 20px;
      }
    }

    @supports not (background: linear-gradient(135deg, #065f46, #0284c7)) {
      body {
        background: #065f46;
      }
    }
  </style>
</head>

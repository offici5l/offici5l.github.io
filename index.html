<body>
    <div id="tsparticles"></div>
    <header></header>
    <main>
        <div id="about">
            <p id="bio"></p>
        </div>
        <div id="projects">
            <h2 id="projects-toggle" class="toggle-button">

        <div id="articles">
            <h2 id="articles-toggle" class="toggle-button">
                Articles <span class="toggle-icon">▷</span>
            </h2>
            <div id="articles-content" style="display: none;">
                <div id="articles-list-container">
                    <p>Loading articles...</p>
                </div>
                <div id="article-full-view-container" style="display: none;"></div>
            </div>
        </div>
        <div id="contact-container"></div>
    </main>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Official Blog</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 0;
  }

  .logo {
    width: 200px;
    height: 200px;
    margin-top: 20px;
  }

  .welcome-text {
    font-size: 24px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    margin: 20px 0;
  }

  .description {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 30px;
  }

  .button-container {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 20px;
  }

  .button {
    background-color: #4CAF50; /* Green background */
    border: none; /* Remove borders */
    color: white; /* White text */
    padding: 15px 30px; /* Reduced padding */
    text-align: center; /* Center text */
    text-decoration: none; /* Remove underline */
    display: inline-block; /* Get the block-level look */
    font-size: 16px; /* Smaller font size */
    margin: 10px; /* Add some margin */
    cursor: pointer; /* Pointer/hand icon */
    border-radius: 10px; /* Rounded corners */
    transition: background-color 0.3s, transform 0.3s; /* Smooth transitions */
    box-shadow: 0 5px 15px rgba(0,0,0,0.2); /* Add shadow */
  }

  .button:hover {
    background-color: #45a049; /* Darker green */
    transform: translateY(-5px); /* Slightly move up */
  }

  .button:active {
    background-color: #3e8e41; /* Even darker green */
    box-shadow: 0 3px 10px rgba(0,0,0,0.2); /* Less shadow */
    transform: translateY(2px); /* Move down on click */
  }
</style>
</head>
<body>
  <div>
    <img src="./logo.png" alt="logo" class="logo">
  </div>

  <div>
    <p class="welcome-text"><strong>Welcome to Official Blog</strong></p>
    <p class="description"><strong>Here, I share my experiences, projects, and topics related to technology and creativity💡</strong></p>
  </div>

  <div class="button-container">
    <button class="button" onclick="window.location.href='./Projects';">Projects</button>
    <button class="button" onclick="window.location.href='./Articles';">Articles</button>
    <button class="button" onclick="window.location.href='./Contact';">Contact</button>
  </div>
</body>
</html>

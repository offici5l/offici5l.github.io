<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offici5l - Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-content">
            <div class="carbon-spinner"></div>
            <p>Loading profile data...</p>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html" class="logo-link">
                    <div class="logo-icon">
                        <i class="fas fa-code"></i>
                    </div>
                    <span class="logo-text">OFFICI5L</span>
                </a>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="index.html" class="nav-link active">Home</a>
                </li>
                <li class="nav-item">
                    <a href="/projects" class="nav-link">Projects</a>
                </li>
                <li class="nav-item">
                    <a href="/articles" class="nav-link">Articles</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Home Section -->
    <section class="home-section">
        <div class="container">
            <div class="hero-content">
                <div class="profile-section">
                    <div class="profile-avatar">
                        <img id="profile-image" src="" alt="Profile" class="avatar-img">
                        <div class="avatar-glow"></div>
                    </div>
                    <div class="profile-info">
                        <h1 class="profile-name" id="profile-name">Loading...</h1>
                        <div class="profile-bio" id="profile-bio">
                            <p>Loading profile information...</p>
                        </div>
                    </div>
                </div>
                
                <div class="action-buttons">
                    <a href="/projects" class="carbon-btn primary">
                        <i class="fas fa-folder-open"></i>
                        <span>Projects</span>
                    </a>
                    <a href="/articles" class="carbon-btn secondary">
                        <i class="fas fa-newspaper"></i>
                        <span>Articles</span>
                    </a>
                </div>
            </div>
        </div>
    </section>

    <!-- Contact and Social Section -->
    <section class="social-section">
        <div class="container">
            <div class="contact-email">
                <p class="email-text">offici5lcontact@proton.me</p>
            </div>
            <div class="social-icons">
                <a href="https://x.com/offici5l" target="_blank" class="social-icon x">
                    <i class="fab fa-x"></i>
                </a>
                <a href="https://t.me/Offici5l_Channel" target="_blank" class="social-icon telegram">
                    <i class="fab fa-telegram"></i>
                </a>
                <a href="https://github.com/offici5l" target="_blank" class="social-icon github">
                    <i class="fab fa-github"></i>
                </a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2025 Offici5l</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>

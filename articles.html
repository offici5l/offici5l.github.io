<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Articles - Tech Odyssey</title>
  <style>
    :root {
      --color-background: rgb(255, 255, 255);
      --color-surface: rgb(239, 243, 244);
      --color-text-primary: rgb(15, 20, 25);
      --color-text-secondary: rgb(83, 100, 113);
      --color-text-tertiary: rgb(130, 154, 171);
      --color-brand-primary: rgb(29, 155, 240);
      --color-border: rgb(239, 243, 244);
      --color-hover: rgba(29, 155, 240, 0.1);
      --color-card-bg: rgb(255, 255, 255);
      --color-card-border: rgb(239, 243, 244);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: ui-sans-serif, system-ui, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
      min-height: 100vh;
      background: var(--color-background);
      color: var(--color-text-primary);
      line-height: 1.6;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--color-border);
    }

    .back-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--color-text-secondary);
      padding: 8px 16px;
      text-decoration: none;
      border-radius: 9999px;
      font-weight: 500;
      transition: all 0.2s ease;
      border: 1px solid var(--color-border);
      font-size: 0.95rem;
    }

    .back-button:hover {
      background: var(--color-hover);
      color: var(--color-brand-primary);
      border-color: var(--color-brand-primary);
      transform: translateX(-2px);
    }

    .page-title {
      font-size: 2rem;
      font-weight: 700;
      color: var(--color-text-primary);
      letter-spacing: -0.02em;
    }

    .articles-stats {
      display: flex;
      gap: 24px;
      margin-bottom: 32px;
      padding: 20px;
      background: var(--color-surface);
      border-radius: 12px;
      border: 1px solid var(--color-border);
    }

    .stat-item {
      text-align: center;
    }

    .stat-number {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--color-brand-primary);
      display: block;
    }

    .stat-label {
      font-size: 0.85rem;
      color: var(--color-text-secondary);
      font-weight: 500;
    }

    #articles-container {
      margin-top: 20px;
    }

    .category-section {
      margin-bottom: 48px;
    }

    .category-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 24px;
      color: var(--color-text-primary);
      padding-bottom: 8px;
      border-bottom: 2px solid var(--color-brand-primary);
      display: inline-block;
    }

    .articles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
    }

    .article-card {
      background: var(--color-card-bg);
      border-radius: 12px;
      padding: 24px;
      border: 1px solid var(--color-card-border);
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .article-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(29, 155, 240, 0.1);
      border-color: var(--color-brand-primary);
    }

    .article-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--color-brand-primary);
      transform: scaleX(0);
      transition: transform 0.2s ease;
    }

    .article-card:hover::before {
      transform: scaleX(1);
    }

    .article-header {
      margin-bottom: 16px;
    }

    .article-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--color-text-primary);
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .article-title a {
      color: inherit;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .article-title a:hover {
      color: var(--color-brand-primary);
    }

    .article-description {
      color: var(--color-text-secondary);
      line-height: 1.6;
      margin-bottom: 20px;
      font-size: 0.95rem;
    }

    .article-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
    }

    .article-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--color-brand-primary);
      color: white;
      padding: 8px 16px;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 500;
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }

    .article-link:hover {
      background: rgb(26, 140, 216);
      transform: translateY(-1px);
    }

    .article-meta {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .article-tag {
      background: var(--color-surface);
      color: var(--color-text-secondary);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--color-text-secondary);
      font-size: 1.1rem;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--color-border);
      border-top: 3px solid var(--color-brand-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--color-text-secondary);
    }

    .empty-state-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      opacity: 0.5;
    }

    @media (max-width: 768px) {
      .container {
        padding: 15px;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }

      .page-title {
        font-size: 1.75rem;
      }

      .articles-grid {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .articles-stats {
        flex-direction: column;
        gap: 16px;
        text-align: center;
      }

      .article-card {
        padding: 20px;
      }

      .category-title {
        font-size: 1.3rem;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 15px;
      }

      .page-title {
        font-size: 1.5rem;
      }

      .article-card {
        padding: 16px;
      }

      .article-title {
        font-size: 1.1rem;
      }

      .article-description {
        font-size: 0.9rem;
      }

      .articles-stats {
        padding: 16px;
      }

      .category-title {
        font-size: 1.2rem;
      }
    }

    /* Focus styles for accessibility */
    .back-button:focus,
    .article-link:focus,
    .article-title a:focus {
      outline: 2px solid var(--color-brand-primary);
      outline-offset: 2px;
    }

    /* Animation for article cards */
    .article-card {
      animation: fadeInUp 0.6s ease-out;
      animation-fill-mode: both;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="index.html" class="back-button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="m12 19-7-7 7-7"/>
          <path d="M19 12H5"/>
        </svg>
        Back to Home
      </a>
      <h1 class="page-title">Articles</h1>
    </div>

    <div class="articles-stats">
      <div class="stat-item">
        <span class="stat-number" id="total-articles">-</span>
        <span class="stat-label">Total Articles</span>
      </div>
      <div class="stat-item">
        <span class="stat-number" id="total-categories">-</span>
        <span class="stat-label">Categories</span>
      </div>
      <div class="stat-item">
        <span class="stat-number" id="latest-update">-</span>
        <span class="stat-label">Latest Update</span>
      </div>
    </div>

    <div id="articles-container">
      <div class="loading">
        <div class="loading-spinner"></div>
        Loading articles...
      </div>
    </div>
  </div>

  <script src="js/content-loader.js"></script>
</body>
</html>

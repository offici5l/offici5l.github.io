name: Generate Content Index

permissions:
  contents: write 

on:
  push:
    branches:
      - main # Exécute le workflow à chaque push sur la branche main
  workflow_dispatch: # Permet de déclencher le workflow manuellement

jobs:
  generate_index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Récupère l'historique complet pour git commit

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Ajoutez ici d'autres dépendances si generate_index.py en a besoin

      - name: Generate content_index.json
        run: python generate_index.py

      - name: Commit and push if changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content_index.json
          git diff --quiet --exit-code || git commit -m "Generate content_index.json"
          git push

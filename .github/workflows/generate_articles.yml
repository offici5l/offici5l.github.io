name: Generate Articles Data

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  generate_data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Generate articles data
      run: python generate_articles_data.py
      working-directory: ./offici5l-portfolio-updated

    - name: Upload generated data
      uses: actions/upload-artifact@v3
      with:
        name: articles-data
        path: offici5l-portfolio-updated/articles_data.json

  deploy:
    needs: generate_data
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Download generated data
      uses: actions/download-artifact@v3
      with:
        name: articles-data
        path: offici5l-portfolio-updated

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./offici5l-portfolio-updated
        force_orphan: true



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiConnect - Unlock Xiaomi Bootloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Theme Variables */
        :root {
            --primary-color: #1f2937;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --success-color: #22c55e;
            --error-color: #ef4444;
            --bg-color: #f9fafb;
            --card-bg: #ffffff;
            --text-color: #6b7280;
            --input-bg: #f9fafb;
            --border-color: #d1d5db;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --shadow-accent: rgba(99, 102, 241, 0.3);
            --success-bg: #f0fdf4;
            --error-bg: #fef2f2;
            --success-text: #15803d;
            --error-text: #b91c1c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e5e7eb 0%, #d1d5db 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 1rem;
            box-shadow: 0 10px 30px var(--shadow-color);
            padding: 2rem;
            animation: fadeIn 0.5s ease-out;
            position: relative;
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .description {
            text-align: center;
            color: var(--text-color);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .description ul {
            list-style: none;
            text-align: left;
            margin-top: 1rem;
            padding-left: 1rem;
        }

        .description li {
            position: relative;
            padding-left: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .description li::before {
            content: '\f058';
            font-family: 'FontAwesome';
            color: var(--accent-color);
            position: absolute;
            left: 0;
            top: 2px;
        }

        .form-section {
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            color: var(--primary-color);
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        input, select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            background: var(--input-bg);
            font-size: 0.95rem;
            color: var(--primary-color);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px var(--shadow-accent);
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        button:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .response {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
            animation: slideIn 0.4s ease;
        }

        .success {
            background: var(--success-bg);
            color: var(--success-text);
        }

        .error {
            background: var(--error-bg);
            color: var(--error-text);
        }

        .response::before {
            font-family: 'FontAwesome';
            font-size: 1rem;
        }

        .success::before {
            content: '\f058';
        }

        .error::before {
            content: '\f06a';
        }

        .divider {
            border: 0;
            border-top: 1px solid var(--border-color);
            margin: 2rem 0;
        }

        .footer {
            text-align: center;
            color: var(--text-color);
            font-size: 0.85rem;
            margin-top: 2rem;
        }

        .footer a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @media (max-width: 480px) {
            .card {
                padding: 1.5rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            .description {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>MiConnect</h1>
            <div class="description">
                <p>sevice allows to unlock the bootloader for Xiaomi devices:</p>
                <ul>
                    <li>Devices operating normally</li>
                    <li>Damaged devices unable to enter normal mode</li>
                    <li>Devices with SIM card or connectivity issues</li>
                </ul>
            </div>

            <!-- Codename Checker Form -->
            <div class="form-section">
                <form id="checkerForm">
                    <div class="form-group">
                        <label for="codename">Device Codename</label>
                        <input type="text" id="codename" name="codename" placeholder="Enter device codename" autocomplete="off">
                    </div>
                    <button type="button" id="checkCodename">Check Codename</button>
                </form>
                <div id="checkResponse" class="response"></div>
            </div>

            <div class="divider"></div>

            <!-- Connect Form -->
            <div class="form-section">
                <form id="workerForm">
                    <div class="form-group">
                        <label for="access">Account ID Apply for authorization | Xiaomi Community:</label>
                        <select id="access" name="access" required disabled>
                            <option value="" disabled selected>?</option>
                            <option value="mandatory">Mandatory</option>
                            <option value="not_mandatory">Not Mandatory</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="id">Account ID</label>
                        <input type="text" id="id" name="id" required placeholder="Enter your Account ID" disabled autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="token">Device Token</label>
                        <input type="text" id="token" name="token" required placeholder="Enter your Device Token" disabled autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="region">Device Region</label>
                        <select id="region" name="region" required disabled>
                            <option value="" disabled selected>Select device region</option>
                            <option value="cn">China</option>
                            <option value="g">Global</option>
                        </select>
                    </div>
                    <button type="submit" disabled>Connect Device</button>
                </form>
                <div id="connectResponse" class="response"></div>
            </div>

            <div class="footer">
                <p>Version: 1.0.0</p>
                <p>Contact: <a href="mailto:offici5lcontact@proton.me">offici5lcontact@proton.me</a></p>
            </div>
        </div>
    </div>

    <script>
        // API Configuration
        const API_CONFIG = {
            CHECK: 'https://check.offici5l.workers.dev',
            CONNECT: 'https://miconnect.offici5l.workers.dev',
            HEADERS: {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            }
        };

        // Message Constants
        const MESSAGES = {
            CHECK: {
                EMPTY_CODENAME: 'Please enter a device codename.',
                UNEXPECTED_RESPONSE: 'Unexpected response from the server.',
                CONNECTION_ERROR: 'Unable to connect to the server. Please try again.',
                CHECK_FAILED: 'Failed to verify codename.'
            },
            CONNECT: {
                SUCCESS: 'Device connected successfully!',
                CONNECTION_ERROR: (msg) => `Connection error: ${msg}`,
                FAILED: 'Failed to connect the device.'
            },
            BUTTON: {
                CHECK: { DEFAULT: 'Check Codename', LOADING: 'Checking...' },
                CONNECT: { DEFAULT: 'Connect Device', LOADING: 'Connecting...' }
            }
        };

        // DOM Elements
        const elements = {
            checkerForm: document.getElementById('checkerForm'),
            checkResponse: document.getElementById('checkResponse'),
            checkButton: document.getElementById('checkCodename'),
            codenameInput: document.getElementById('codename'),
            workerForm: document.getElementById('workerForm'),
            connectResponse: document.getElementById('connectResponse'),
            submitButton: document.querySelector('#workerForm button[type="submit"]'),
            accessSelect: document.getElementById('access'),
            idInput: document.getElementById('id'),
            tokenInput: document.getElementById('token'),
            regionSelect: document.getElementById('region')
        };

        // Utility Functions
        const showResponse = (element, message, type) => {
            element.style.display = 'flex';
            element.className = `response ${type}`;
            element.textContent = message;
        };

        const enableConnectForm = () => {
            elements.idInput.disabled = false;
            elements.tokenInput.disabled = false;
            elements.regionSelect.disabled = false;
            elements.submitButton.disabled = false;
        };

        const setAccessValue = (value) => {
            elements.accessSelect.disabled = false;
            elements.accessSelect.value = value;
            elements.accessSelect.disabled = true;
        };

        // Codename Checker
        elements.checkButton.addEventListener('click', async () => {
            const codename = elements.codenameInput.value.trim();
            if (!codename) {
                showResponse(elements.checkResponse, MESSAGES.CHECK.EMPTY_CODENAME, 'error');
                return;
            }

            const url = new URL(API_CONFIG.CHECK);
            url.searchParams.append('codename', codename);

            try {
                elements.checkResponse.style.display = 'none';
                elements.checkButton.disabled = true;
                elements.checkButton.textContent = MESSAGES.BUTTON.CHECK.LOADING;

                const response = await fetch(url, {
                    method: 'GET',
                    headers: API_CONFIG.HEADERS,
                    mode: 'cors'
                });

                const data = await response.json();

                if (response.ok && 'result' in data) {
                    if (data.result === 0) {
                        enableConnectForm();
                        setAccessValue('not_mandatory');
                    } else if (data.result === 1) {
                        enableConnectForm();
                        setAccessValue('mandatory');
                    } else {
                        showResponse(elements.checkResponse, MESSAGES.CHECK.UNEXPECTED_RESPONSE, 'error');
                    }
                } else {
                    showResponse(elements.checkResponse, data.error || MESSAGES.CHECK.CHECK_FAILED, 'error');
                }
            } catch (error) {
                showResponse(elements.checkResponse, MESSAGES.CHECK.CONNECTION_ERROR, 'error');
            } finally {
                elements.checkButton.disabled = false;
                elements.checkButton.textContent = MESSAGES.BUTTON.CHECK.DEFAULT;
            }
        });

        // Connect Form Submission
        elements.workerForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            // Map access values: mandatory -> yes, not_mandatory -> no
            const accessValue = elements.accessSelect.value === 'mandatory' ? 'yes' : 'no';

            const params = {
                id: elements.idInput.value,
                token: elements.tokenInput.value,
                region: elements.regionSelect.value,
                access: accessValue
            };

            const url = new URL(API_CONFIG.CONNECT);
            Object.keys(params).forEach(key => url.searchParams.append(key, params[key]));

            try {
                elements.connectResponse.style.display = 'none';
                elements.submitButton.disabled = true;
                elements.submitButton.textContent = MESSAGES.BUTTON.CONNECT.LOADING;

                const response = await fetch(url, {
                    method: 'GET',
                    headers: API_CONFIG.HEADERS
                });

                const data = await response.json();

                showResponse(
                    elements.connectResponse,
                    response.ok ? (data.message || MESSAGES.CONNECT.SUCCESS) : (data.message || MESSAGES.CONNECT.FAILED),
                    response.ok ? 'success' : 'error'
                );
            } catch (error) {
                showResponse(elements.connectResponse, MESSAGES.CONNECT.CONNECTION_ERROR(error.message), 'error');
            } finally {
                elements.submitButton.disabled = false;
                elements.submitButton.textContent = MESSAGES.BUTTON.CONNECT.DEFAULT;
            }
        });
    </script>
</body>
</html>

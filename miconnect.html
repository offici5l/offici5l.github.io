<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <title>MiConnect - Unlock Xiaomi Bootloader</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e5e7eb 0%, #d1d5db 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .card {
            background: #ffffff;
            border-radius: 1rem;
            border: 1px solid #e5e7eb;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 1.5rem;
            animation: fadeIn 0.5s ease-out;
            position: relative;
            transition: box-shadow 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 15px 40px rgba(99, 102, 241, 0.2);
        }

        h1 {
            color: #1f2937;
            text-align: center;
            font-size: clamp(1.75rem, 5vw, 2rem);
            font-weight: 700;
            margin-bottom: 1.5rem;
            position: relative;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: -0.5rem;
            left: 50%;
            width: 50px;
            height: 3px;
            background: #6366f1;
            transform: translateX(-50%);
            transition: width 0.3s ease;
        }

        h1:hover::after {
            width: 100px;
        }

        .description {
            text-align: center;
            color: #6b7280;
            font-size: clamp(0.9rem, 4vw, 1rem);
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .description ul {
            list-style: none;
            text-align: left;
            margin-top: 1rem;
            padding-left: 1rem;
        }

        .description li {
            position: relative;
            padding-left: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .description li::before {
            content: '\f058';
            font-family: 'FontAwesome';
            color: #6366f1;
            position: absolute;
            left: 0;
            top: 2px;
        }

        .form-section {
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
            position: relative;
        }

        label {
            display: block;
            color: #1f2937;
            font-weight: 500;
            font-size: clamp(0.9rem, 3.5vw, 0.95rem);
            margin-bottom: 0.5rem;
        }

        input, select {
            width: 100%;
            padding: 0.85rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            background: #f9fafb;
            font-size: clamp(0.9rem, 4vw, 1rem);
            color: #1f2937;
            transition: border-color 0.3s ease, box-shadow 0.3s ease, transform 0.2s ease;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
            transform: translateY(-2px);
        }

        input:invalid:not(:placeholder-shown) {
            border-color: #ef4444;
        }

        select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%231f2937' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.85rem center;
            background-size: 1rem;
        }

        select#access {
            font-size: 0.85rem;
            padding: 0.5rem;
            height: 2rem;
            background-image: none;
            border-radius: 0.375rem;
            width: auto;
            min-width: 120px;
            color: #1f2937;
        }

        select#access:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
        }

        select#access.mandatory {
            background-color: #f97316;
            color: #ffffff;
        }

        select#access.not-mandatory {
            background-color: #22c55e;
            color: #ffffff;
        }

        .region-label {
            color: #6366f1;
            font-size: clamp(0.85rem, 3.5vw, 0.9rem);
            margin-left: 0.5rem;
        }

        button {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(90deg, #6366f1, #4f46e5);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: clamp(0.95rem, 4vw, 1.1rem);
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover:not(:disabled) {
            background: linear-gradient(90deg, #4f46e5, #4338ca);
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
        }

        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        button.loading::after {
            content: '';
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 0.5rem;
        }

        .response {
            margin-top: 1rem;
            padding: 0.85rem 1rem;
            border-radius: 0.5rem;
            font-size: clamp(0.85rem, 3.5vw, 0.95rem);
            display: none;
            align-items: center;
            gap: 0.5rem;
            animation: slideIn 0.4s ease;
        }

        .success {
            background: #f0fdf4;
            color: #15803d;
        }

        .error {
            background: #fef2f2;
            color: #b91c1c;
        }

        .response::before {
            font-family: 'FontAwesome';
            font-size: 1rem;
        }

        .success::before {
            content: '\f058';
        }

        .error::before {
            content: '\f06a';
        }

        .divider {
            border: 0;
            border-top: 1px solid #d1d5db;
            margin: 1.5rem 0;
        }

        .footer {
            text-align: center;
            color: #6b7280;
            font-size: clamp(0.8rem, 3vw, 0.9rem);
            margin-top: 1.5rem;
        }

        .footer a {
            color: #6366f1;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: #4f46e5;
            text-decoration: underline;
        }

        @media (min-width: 768px) {
            .container {
                padding: 0 2rem;
            }

            .card {
                padding: 2rem;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 2rem;
            }

            .form-section {
                min-width: 300px;
            }

            .description {
                min-width: 300px;
            }

            h1 {
                grid-column: 1 / -1;
            }

            .divider {
                display: none;
            }

            .footer {
                grid-column: 1 / -1;
            }
        }

        @media (max-width: 767px) {
            body {
                padding: 0.5rem;
            }

            .container {
                padding: 0 0.5rem;
            }

            .card {
                padding: 1rem;
            }

            .form-section, .description {
                width: 100%;
            }

            button {
                position: sticky;
                bottom: 1rem;
            }
        }

        @media (max-width: 480px) {
            html {
                font-size: 14px;
            }

            .card {
                padding: 0.75rem;
            }

            button {
                padding: 0.75rem;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        input, select, button {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }

        button:focus {
            outline: 2px solid #6366f1;
            outline-offset: 2px;
        }

        @media (prefers-contrast: high) {
            .card {
                background: #ffffff;
                border-color: #000000;
            }

            button {
                border: 1px solid #000000;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none;
                transition: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>MiConnect</h1>
            <div class="description">
                <p>Service allows to unlock the bootloader for Xiaomi devices:</p>
                <ul>
                    <li>Devices operating normally</li>
                    <li>Damaged devices unable to enter normal mode</li>
                    <li>SIM does not work, for several reasons</li>
                    <li>Errors while binding account in developer options</li>
                </ul>
            </div>
            <div class="form-section">
                <form id="checkerForm" aria-label="Check Device Codename">
                    <div class="form-group">
                        <label for="codename">Device Codename</label>
                        <input type="text" id="codename" name="codename" placeholder="Enter device codename" autocomplete="off" aria-required="true" required>
                    </div>
                    <button type="button" id="checkCodename">Check</button>
                </form>
                <div id="checkResponse" class="response" role="alert"></div>
            </div>
            <div class="form-section">
                <form id="workerForm" aria-label="Connect Device">
                    <div class="form-group">
                        <label for="access">Account ID Apply for authorization | Xiaomi Community:</label>
                        <select id="access" name="access" required disabled aria-required="true">
                            <option value="" disabled selected>?</option>
                            <option value="mandatory">Mandatory</option>
                            <option value="not_mandatory">Not Mandatory</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="region">Device Region</label>
                        <select id="region" name="region" required aria-required="true">
                            <option value="" disabled selected>Select device region</option>
                            <option value="cn">China</option>
                            <option value="g">Global</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="id">Account ID <span class="region-label" id="regionLabel"></span></label>
                        <input type="text" id="id" name="id" required placeholder="Enter your Account ID" disabled autocomplete="off" aria-required="true">
                    </div>
                    <div class="form-group">
                        <label for="token">Device Token</label>
                        <input type="text" id="token" name="token" required placeholder="Enter your Device Token" disabled autocomplete="off" aria-required="true">
                    </div>
                    <button type="submit" disabled>Connect Device</button>
                </form>
                <div id="connectResponse" class="response" role="alert"></div>
            </div>
            <div class="footer">
                <p>Version: 1.0.0</p>
                <p>Contact: <a href="mailto:offici5lcontact@proton.me">offici5lcontact@proton.me</a></p>
            </div>
        </div>
    </div>
    <script>
        const showResponse = (element, message, type) => {
            element.style.display = 'flex';
            element.className = `response ${type}`;
            element.textContent = message;
            element.setAttribute('aria-live', 'assertive');
        };

        const checkerForm = document.getElementById('checkerForm');
        const checkResponse = document.getElementById('checkResponse');
        const checkButton = document.getElementById('checkCodename');
        const codenameInput = document.getElementById('codename');
        const workerForm = document.getElementById('workerForm');
        const connectResponse = document.getElementById('connectResponse');
        const submitButton = workerForm.querySelector('button[type="submit"]');
        const accessSelect = document.getElementById('access');
        const idInput = document.getElementById('id');
        const tokenInput = document.getElementById('token');
        const regionSelect = document.getElementById('region');
        const regionLabel = document.getElementById('regionLabel');

        // Function to update access select color
        const updateAccessColor = () => {
            if (accessSelect.value === 'mandatory') {
                accessSelect.classList.remove('not-mandatory');
                accessSelect.classList.add('mandatory');
            } else if (accessSelect.value === 'not_mandatory') {
                accessSelect.classList.remove('mandatory');
                accessSelect.classList.add('not-mandatory');
            } else {
                accessSelect.classList.remove('mandatory', 'not-mandatory');
            }
        };

        // Update color when access value changes
        accessSelect.addEventListener('change', updateAccessColor);

        regionSelect.addEventListener('change', () => {
            const region = regionSelect.value;
            if (region === 'cn') {
                regionLabel.textContent = '(China)';
                idInput.disabled = false;
            } else if (region === 'g') {
                regionLabel.textContent = '(Global)';
                idInput.disabled = false;
            } else {
                regionLabel.textContent = '';
                idInput.disabled = true;
            }
        });

        checkButton.addEventListener('click', async () => {
            const codename = codenameInput.value.trim();
            if (!codename) {
                showResponse(checkResponse, 'Please enter a device codename.', 'error');
                return;
            }

            const url = new URL('https://check.offici5l.workers.dev');
            url.searchParams.append('codename', codename);

            try {
                checkResponse.style.display = 'none';
                checkButton.disabled = true;
                checkButton.classList.add('loading');
                checkButton.textContent = 'Checking';

                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    mode: 'cors'
                });

                const data = await response.json();

                if (response.ok && 'result' in data) {
                    if (data.result === 0) {
                        tokenInput.disabled = false;
                        submitButton.disabled = false;
                        regionSelect.disabled = false;
                        accessSelect.disabled = false;
                        accessSelect.value = 'not_mandatory';
                        accessSelect.disabled = true;
                        updateAccessColor();
                    } else if (data.result === 1) {
                        tokenInput.disabled = false;
                        submitButton.disabled = false;
                        regionSelect.disabled = false;
                        accessSelect.disabled = false;
                        accessSelect.value = 'mandatory';
                        accessSelect.disabled = true;
                        updateAccessColor();
                    } else {
                        showResponse(checkResponse, 'Unexpected response from the server.', 'error');
                    }
                } else {
                    showResponse(checkResponse, data.error || 'Failed to verify codename.', 'error');
                }
            } catch {
                showResponse(checkResponse, 'Unable to connect to the server. Please try again.', 'error');
            } finally {
                checkButton.disabled = false;
                checkButton.classList.remove('loading');
                checkButton.textContent = 'Check';
            }
        });

        workerForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const accessValue = accessSelect.value === 'mandatory' ? 'yes' : 'no';
            const params = {
                id: idInput.value.trim(),
                token: tokenInput.value.trim(),
                region: regionSelect.value,
                access: accessValue
            };

            if (!params.id || !params.token || !params.region) {
                showResponse(connectResponse, 'Please fill all required fields.', 'error');
                return;
            }

            try {
                connectResponse.style.display = 'none';
                submitButton.disabled = true;
                submitButton.classList.add('loading');
                submitButton.textContent = 'Connecting';

                const response = await fetch('https://miconnect.offici5l.workers.dev', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(params)
                });

                let data;
                try {
                    data = await response.json();
                } catch {
                    const text = await response.text();
                    showResponse(connectResponse, `Server returned non-JSON response: ${text}`, 'error');
                    return;
                }

                if (response.ok && (data.success || data.status === 'success')) {
                    showResponse(connectResponse, 'Device connected successfully!', 'success');
                } else {
                    const errorMessage = data.error || data.message || data.errorMessage || data.reason || 'Failed to connect the device.';
                    showResponse(connectResponse, errorMessage, 'error');
                }
            } catch (error) {
                showResponse(connectResponse, `Connection error: ${error.message}`, 'error');
            } finally {
                submitButton.disabled = false;
                submitButton.classList.remove('loading');
                submitButton.textContent = 'Connect Device';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Execute POST with Fetch</title>
</head>
<body>
    <h1>Result</h1>
    <pre id="result">Loading data...</pre>

    <script>
        const url = "https://account.xiaomi.com/pass/serviceLoginAuth2";
        const bodyData = `https://account.xiaomi.com/pass/serviceLogin?sid=unlockApi&checkSafeAddress=true&_json=true`;

        fetch(url, {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded",
            },
            body: bodyData
        })
        .then(res => res.text())
        .then(data => {
            document.getElementById('result').textContent = data;
        })
        .catch(error => {
            document.getElementById('result').textContent = "Error occurred: " + error;
        });
    </script>
</body>
</html>

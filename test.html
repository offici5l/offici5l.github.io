<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch Request with Error Details</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #output {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
            white-space: pre-wrap; /* Preserve formatting */
        }
    </style>
</head>
<body>
    <h1>Fetch Request with Error Details</h1>
    <button id="fetchButton">Execute Request</button>
    <div id="output">The result will appear here...</div>

    <script>
        document.getElementById('fetchButton').addEventListener('click', function () {
            // Execute the fetch request
            fetch("https://account.xiaomi.com/pass/serviceLogin?sid=unlockApi&checkSafeAddress=true&_json=true")
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status} - ${response.statusText}`);
                    }
                    return response.text();
                })
                .then(data => {
                    // Display the result inside the frame
                    document.getElementById('output').textContent = data;
                })
                .catch(error => {
                    // Display the full error inside the frame
                    document.getElementById('output').textContent = 
                        `Error: ${error.message}\n` +
                        `Additional Details: ${error.stack || "No additional details available"}`;
                });
        });
    </script>
</body>
</html>

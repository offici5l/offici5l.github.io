<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .not-found-container {
            max-width: 500px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }
        a {
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="not-found-container">
        <h1>404</h1>
        <p>The page you are looking for does not exist.</p>
        <a href="/" id="back-to-home">Go to Homepage</a>
    </div>
</body>
</html>
